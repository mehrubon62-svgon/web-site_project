{% extends 'base_auth.html' %}

{% block title %}Forgot Password - BuildBox{% endblock %}

{% block content %}
<div class="w-full max-w-[400px]">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-8 shadow-lg border border-gray-200 dark:border-gray-700">
        <div class="mb-6 pb-6 border-b border-gray-200 dark:border-gray-700">
            <div class="w-10 h-1 bg-accent rounded mb-4"></div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Forgot Password</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Enter your email to reset password</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all outline-none bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
                    placeholder="Enter your email address"
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-amber-500 text-gray-900 py-3 rounded-lg font-medium hover:opacity-90 transition-opacity"
            >
                Send Reset Link
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'login_view' %}" class="flex items-center justify-center gap-2 text-sm text-gray-500 dark:text-gray-400 hover:opacity-70 transition-opacity">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to login
            </a>
        </div>
    </div>
</div>
{% endblock %}
