{% extends 'base_auth.html' %}

{% block title %}Sign Up - BuildBox{% endblock %}

{% block content %}
<div class="w-full max-w-[400px]">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-8 shadow-lg border border-gray-200 dark:border-gray-700">
        <div class="mb-6 pb-6 border-b border-gray-200 dark:border-gray-700">
            <div class="w-10 h-1 bg-accent rounded mb-4"></div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Create Account</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Join BuildBox today</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-3 py-2 rounded-lg text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
                    placeholder="Choose a username"
                >
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
                    placeholder="Enter your email"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Password</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        class="w-full px-4 py-3 pr-12 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
                        placeholder="Create a password"
                        oninput="checkPasswordStrength()"
                    >
                    <button type="button" onclick="togglePassword('password', 'eye-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <svg id="eye-password" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
                <div id="password-strength" class="mt-2 hidden">
                    <div class="flex gap-1 mb-1">
                        <div id="strength-bar-1" class="h-1 flex-1 bg-gray-200 dark:bg-gray-600 rounded transition-all"></div>
                        <div id="strength-bar-2" class="h-1 flex-1 bg-gray-200 dark:bg-gray-600 rounded transition-all"></div>
                        <div id="strength-bar-3" class="h-1 flex-1 bg-gray-200 dark:bg-gray-600 rounded transition-all"></div>
                    </div>
                    <p id="strength-text" class="text-xs"></p>
                </div>
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Confirm Password</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        required
                        class="w-full px-4 py-3 pr-12 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none bg-white dark:bg-gray-900 text-gray-900 dark:text-white"
                        placeholder="Confirm your password"
                        oninput="checkPasswordMatch()"
                    >
                    <button type="button" onclick="togglePassword('confirm_password', 'eye-confirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <svg id="eye-confirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
                <p id="match-text" class="text-xs mt-1 hidden"></p>
            </div>

            <button 
                type="submit"
                class="w-full bg-accent text-gray-900 py-3 rounded-lg font-medium hover:opacity-90 transition-opacity"
            >
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
            Already have an account? 
            <a href="{% url 'login_view' %}" class="text-accent hover:opacity-70 transition-opacity">Sign in</a>
        </p>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
    }

    function checkPasswordStrength() {
        const password = document.getElementById('password').value;
        const strengthDiv = document.getElementById('password-strength');
        const strengthText = document.getElementById('strength-text');
        const bars = [
            document.getElementById('strength-bar-1'),
            document.getElementById('strength-bar-2'),
            document.getElementById('strength-bar-3')
        ];

        if (password.length === 0) {
            strengthDiv.classList.add('hidden');
            return;
        }

        strengthDiv.classList.remove('hidden');

        let level = 0;
        if (password.length < 6) level = 1;
        else if (password.length < 10 || !/[0-9]/.test(password)) level = 2;
        else level = 3;

        bars.forEach(bar => bar.className = 'h-1 flex-1 bg-gray-200 dark:bg-gray-600 rounded transition-all');

        if (level === 1) {
            bars[0].className = 'h-1 flex-1 bg-red-500 rounded transition-all';
            strengthText.textContent = 'Weak password';
            strengthText.className = 'text-xs text-red-500';
        } else if (level === 2) {
            bars[0].className = 'h-1 flex-1 bg-amber-500 rounded transition-all';
            bars[1].className = 'h-1 flex-1 bg-amber-500 rounded transition-all';
            strengthText.textContent = 'Fair password';
            strengthText.className = 'text-xs text-amber-500';
        } else if (level === 3) {
            bars[0].className = 'h-1 flex-1 bg-green-500 rounded transition-all';
            bars[1].className = 'h-1 flex-1 bg-green-500 rounded transition-all';
            bars[2].className = 'h-1 flex-1 bg-green-500 rounded transition-all';
            strengthText.textContent = 'Good password';
            strengthText.className = 'text-xs text-green-500';
        }

        checkPasswordMatch();
    }

    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const matchText = document.getElementById('match-text');

        if (confirmPassword.length === 0) {
            matchText.classList.add('hidden');
            return;
        }

        matchText.classList.remove('hidden');

        if (password === confirmPassword) {
            matchText.textContent = '✓ Passwords match';
            matchText.className = 'text-xs mt-1 text-green-500';
        } else {
            matchText.textContent = '✗ Passwords do not match';
            matchText.className = 'text-xs mt-1 text-red-500';
        }
    }
</script>
{% endblock %}
